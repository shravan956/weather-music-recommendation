<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Moodwave</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #08080f;
      --surface: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #1db954;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --text2: #8888aa;
      --error: #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #08080f 0%, #0f0820 50%, #080f08 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: rgba(12, 12, 24, 0.75);
      backdrop-filter: blur(22px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 30px;
      justify-content: center;
    }

    .logo-ico {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .logo span {
      color: var(--accent);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--text2);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 15px;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.15);
    }

    input::placeholder {
      color: var(--text2);
    }

    .btn-register {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #18a845);
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 10px;
      font-family: 'Inter', sans-serif;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(29, 185, 84, 0.3);
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      color: var(--text2);
      font-size: 0.9rem;
    }

    .login-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      transition: 0.3s ease;
    }

    .login-link a:hover {
      color: #18a845;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .success-msg {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }

    .success-msg.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">
      <div class="logo-ico">🎵</div>
      <span>Mood</span>wave
    </div>

    <h1>Create Account</h1>
    <p class="subtitle">Join Moodwave and get personalized music recommendations</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="registerForm" method="POST" action="/register">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
      </div>

      <button type="submit" class="btn-register">Register</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="/database-login">Sign in here</a>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      
      if (password !== confirmPassword) {
        e.preventDefault();
        showError('Passwords do not match!');
        return;
      }

      if (password.length < 6) {
        e.preventDefault();
        showError('Password must be at least 6 characters long!');
        return;
      }
    });

    function showError(msg) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
      setTimeout(() => errorDiv.classList.remove('show'), 5000);
    }
  </script>
</body>
</html>
